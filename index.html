<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaFlex - Manga Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23FF6B6B' width='192' height='192' rx='40'/><g fill='white' transform='translate(48 48)'><path d='M32 0H8C3.58 0 0 3.58 0 8v80c0 4.42 3.58 8 8 8h24c4.42 0 8-3.58 8-8V8c0-4.42-3.58-8-8-8z' opacity='0.3'/><path d='M64 16H40c-4.42 0-8 3.58-8 8v64c0 4.42 3.58 8 8 8h24c4.42 0 8-3.58 8-8V24c0-4.42-3.58-8-8-8z'/></g></svg>" />
</head>
<body>
    <!-- Header/ActionBar -->
    <header class="app-header">
        <div class="header-content">
            <h1 class="app-title">
                <span class="material-icons">menu_book</span>
                MangaFlex
            </h1>
            <div class="header-actions">
                <button class="icon-button" id="themeToggle" title="Toggle Dark Mode">
                    <span class="material-icons">brightness_4</span>
                </button>
                <button class="icon-button" id="searchBtn" title="Search">
                    <span class="material-icons">search</span>
                </button>
                <button class="icon-button" id="settingsBtn" title="Settings">
                    <span class="material-icons">settings</span>
                </button>
            </div>
        </div>
        
        <!-- Search Bar (Hidden by default) -->
        <div class="search-bar" id="searchBar">
            <input type="text" placeholder="Search manga..." id="searchInput">
            <button class="icon-button" id="closeSearchBtn">
                <span class="material-icons">close</span>
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-category="trending">
            <span class="material-icons">local_fire_department</span>
            <span class="nav-label">Trending</span>
        </button>
        <button class="nav-item" data-category="airing">
            <span class="material-icons">update</span>
            <span class="nav-label">Publishing</span>
        </button>
        <button class="nav-item" data-category="bypopularity">
            <span class="material-icons">favorite</span>
            <span class="nav-label">Popular</span>
        </button>
        <button class="nav-item" data-category="upcoming">
            <span class="material-icons">calendar_month</span>
            <span class="nav-label">Upcoming</span>
        </button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading manga...</p>
        </div>

        <!-- Content Container -->
        <div class="content-container" id="contentContainer">
            <!-- Manga Grid will be populated here -->
        </div>

        <!-- Error State -->
        <div class="error-state" id="errorState" style="display: none;">
            <span class="material-icons">error_outline</span>
            <p id="errorMessage">Failed to load manga. Please check your connection and try again.</p>
            <button class="btn-primary" onclick="location.reload()">Retry</button>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="fab" title="Read Random Manga">
        <span class="material-icons">shuffle</span>
    </button>

    <!-- Modal for Manga Details -->
    <div class="modal" id="mangaModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <span class="material-icons">close</span>
            </button>
            <div class="modal-body" id="modalBody">
                <!-- Manga details will be populated here -->
            </div>
        </div>
    </div>

    <!-- Manga Reader Modal -->
    <div class="modal" id="readerModal">
        <div class="reader-container">
            <div class="reader-header">
                <button class="icon-button" id="closeReaderBtn" style="color: var(--text-primary);">
                    <span class="material-icons">close</span>
                </button>
                <h2 id="readerTitle"></h2>
                <div class="reader-controls">
                    <select id="volumeSelect">
                        <option value="">Select Volume</option>
                    </select>
                    <button class="icon-button" id="prevPageBtn" style="color: var(--text-primary);">
                        <span class="material-icons">navigate_before</span>
                    </button>
                    <span id="pageCounter"></span>
                    <button class="icon-button" id="nextPageBtn" style="color: var(--text-primary);">
                        <span class="material-icons">navigate_next</span>
                    </button>
                </div>
            </div>
            <div class="reader-content" id="readerContent">
                <!-- Pages will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="icon-button" id="closeSettingsBtn">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label>API Source</label>
                <select id="apiSelect">
                    <option value="jikan">Jikan API (MAL)</option>
                </select>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
